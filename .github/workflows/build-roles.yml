name: Build Role Archives

on:
  push:
    branches: [main]
    paths:
      - 'roles/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package devbox role
        run: cd roles/devbox && tar cf ../../trustmebro_devbox.tar .

      - name: Package target role
        run: cd roles/target && tar cf ../../trustmebro_target.tar .

      - name: Package kali role
        run: cd roles/kali && tar cf ../../trustmebro_kali.tar .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ludus-roles
          path: |
            trustmebro_devbox.tar
            trustmebro_target.tar
            trustmebro_kali.tar

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: roles-latest
          name: Ludus Roles
          body: |
            Pre-packaged Ansible roles for Ludus.

            ```bash
            ludus ansible roles add trustmebro_devbox.tar
            ludus ansible roles add trustmebro_target.tar
            ludus ansible roles add trustmebro_kali.tar
            ```
          files: |
            trustmebro_devbox.tar
            trustmebro_target.tar
            trustmebro_kali.tar
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
