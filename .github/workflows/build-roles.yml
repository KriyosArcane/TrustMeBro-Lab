name: Build Role Archives

on:
  push:
    branches: [main]
    paths:
      - 'roles/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package devbox role
        run: cd roles && tar czf ../trustmebro_devbox.tar.gz devbox/

      - name: Package target role
        run: cd roles && tar czf ../trustmebro_target.tar.gz target/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ludus-roles
          path: |
            trustmebro_devbox.tar.gz
            trustmebro_target.tar.gz

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: roles-latest
          name: Ludus Roles
          body: |
            Pre-packaged Ansible roles for Ludus.

            ```bash
            ludus ansible roles add trustmebro_devbox.tar.gz
            ludus ansible roles add trustmebro_target.tar.gz
            ```
          files: |
            trustmebro_devbox.tar.gz
            trustmebro_target.tar.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
