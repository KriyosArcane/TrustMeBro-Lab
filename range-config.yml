# yaml-language-server: $schema=https://docs.ludus.cloud/schemas/range-config.json

# TrustMeBro DEF CON Lab
# All machines on VLAN 10. No domain. Flat network.
#
# Elastic agent auto-discovery: the ludus_elastic_agent role reads the
# enrollment token from the elastic server via delegate_to. The depends_on
# guarantees the container is fully up before enrollment starts.
# Agent version MUST match stack version to avoid Fleet incompatibility.

ludus:
  # ── DevBox (Operator) ─────────────────────────────────────────────
  - vm_name: "{{ range_id }}-devbox"
    hostname: "{{ range_id }}-DEVBOX"
    template: win11-22h2-x64-enterprise-template
    vlan: 10
    ip_last_octet: 20
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: true
      chocolatey_packages:
        - mingw
        - python3
        - git
        - osslsigncode
    testing:
      snapshot: true
      block_internet: false
    roles:
      - trustmebro_devbox

  # ── Elastic Stack ─────────────────────────────────────────────────
  - vm_name: "{{ range_id }}-elastic"
    hostname: "{{ range_id }}-elastic"
    template: debian-12-x64-server-template
    vlan: 10
    ip_last_octet: 10
    ram_gb: 8
    cpus: 4
    linux: true
    testing:
      snapshot: false
      block_internet: false
    roles:
      - name: badsectorlabs.ludus_elastic_container
    role_vars:
      ludus_elastic_password: "TrustMeBro2026!"
      ludus_elastic_license_type: "trial"

  # ── Target (Victim) ───────────────────────────────────────────────
  - vm_name: "{{ range_id }}-target"
    hostname: "{{ range_id }}-TARGET"
    template: win11-22h2-x64-enterprise-template
    vlan: 10
    ip_last_octet: 30
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: true
    testing:
      snapshot: true
      block_internet: false
    roles:
      - trustmebro_target
      - name: badsectorlabs.ludus_elastic_agent
        depends_on:
          - vm_name: "{{ range_id }}-elastic"
            role: badsectorlabs.ludus_elastic_container
    role_vars:
      ludus_elastic_install_sysmon: true

  # ── Kali (Attacker) ──────────────────────────────────────────────
  - vm_name: "{{ range_id }}-kali"
    hostname: "{{ range_id }}-kali"
    template: kali-x64-desktop-template
    vlan: 10
    ip_last_octet: 40
    ram_gb: 6
    cpus: 4
    linux: true
    testing:
      snapshot: true
      block_internet: false
    roles:
      - trustmebro_kali
    role_vars:
      tailscale_authkey: "tskey-auth-knmK5zkXmG11CNTRL-oAsAF3jhc4XXVisQgBcj3XtbUaBxnaHt"
