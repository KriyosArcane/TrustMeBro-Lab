# yaml-language-server: $schema=https://docs.ludus.cloud/schemas/range-config.json

# TrustMeBro DEF CON Lab
# Demonstrates Authenticode manipulation and SIP hijacking defeating Elastic EDR

ludus:
  # ── Domain Controller ──────────────────────────────────────────────
  - vm_name: "{{ range_id }}-dc01"
    hostname: "{{ range_id }}-DC01"
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 11
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    domain:
      fqdn: trustme.lab
      role: primary-dc
    testing:
      snapshot: true
      block_internet: false

  # ── DevBox (Operator) ──────────────────────────────────────────────
  - vm_name: "{{ range_id }}-devbox"
    hostname: "{{ range_id }}-DEVBOX"
    template: win11-22h2-x64-enterprise-template
    vlan: 10
    ip_last_octet: 20
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: true
      chocolatey_packages:
        - mingw
        - python3
        - git
        - osslsigncode
    domain:
      fqdn: trustme.lab
      role: member
    testing:
      snapshot: true
      block_internet: false
    roles:
      - trustmebro_devbox

  # ── Target (Victim) ───────────────────────────────────────────────
  - vm_name: "{{ range_id }}-target"
    hostname: "{{ range_id }}-TARGET"
    template: win11-22h2-x64-enterprise-template
    vlan: 10
    ip_last_octet: 30
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: true
    domain:
      fqdn: trustme.lab
      role: member
    testing:
      snapshot: true
      block_internet: true
    roles:
      - name: badsectorlabs.ludus_elastic_agent
        depends_on:
          - vm_name: "{{ range_id }}-elastic"
            role: badsectorlabs.ludus_elastic_container
      - trustmebro_target

  # ── Elastic Stack ─────────────────────────────────────────────────
  - vm_name: "{{ range_id }}-elastic"
    hostname: "{{ range_id }}-elastic"
    template: debian-12-x64-server-template
    vlan: 20
    ip_last_octet: 2
    ram_gb: 8
    cpus: 4
    linux: true
    testing:
      snapshot: false
      block_internet: false
    roles:
      - badsectorlabs.ludus_elastic_container
    role_vars:
      ludus_elastic_password: "TrustMeBro2026!"
      ludus_elastic_license_type: "trial"

  # ── Kali (Attacker) ──────────────────────────────────────────────
  - vm_name: "{{ range_id }}-kali"
    hostname: "{{ range_id }}-kali"
    template: kali-x64-desktop-template
    vlan: 99
    ip_last_octet: 1
    ram_gb: 4
    cpus: 2
    linux: true
    testing:
      snapshot: true
      block_internet: false

network:
  inter_vlan_default: REJECT
  rules:
    # DevBox and Kali reach Target
    - name: DevBox to Target
      vlan_src: 10
      ip_last_octet_src: 20
      vlan_dst: 10
      ip_last_octet_dst: 30
      protocol: all
      ports: all
      action: ACCEPT
    - name: Kali to Target
      vlan_src: 99
      ip_last_octet_src: 1
      vlan_dst: 10
      ip_last_octet_dst: 30
      protocol: all
      ports: all
      action: ACCEPT
    # All machines reach Elastic
    - name: VLAN 10 to Elastic
      vlan_src: 10
      vlan_dst: 20
      protocol: tcp
      ports: 443,5601,8220,9200
      action: ACCEPT
    - name: Kali to Elastic
      vlan_src: 99
      vlan_dst: 20
      protocol: tcp
      ports: 443,5601,8220,9200
      action: ACCEPT

defaults:
  ad_domain_functional_level: Win2012R2
  ad_domain_admin: domainadmin
  ad_domain_admin_password: "TrustMe@Lab2026"
  ad_domain_user: demouser
  ad_domain_user_password: "Demo@User2026"
