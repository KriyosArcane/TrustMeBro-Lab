---
# DevBox setup: operator machine for TrustMeBro demos
#
# RELIABILITY RULES FOR 50+ INSTANCE DEPLOYMENT:
# - Never restart WinRM, RDP, or any Ludus management service
# - Never touch the management NIC or firewall rules on the management interface
# - Every task must be idempotent (safe to run twice)
# - No ignore_errors on critical tasks
# - Retries on network-dependent operations

# ── Defender: nuke it (flarevm approach, must run FIRST) ─────────────
- name: Add whole-drive Defender exclusion (bypasses Tamper Protection)
  ansible.windows.win_powershell:
    script: |
      Add-MpPreference -ExclusionPath 'C:\' -ErrorAction SilentlyContinue
  failed_when: false

- name: Check Tamper Protection status
  ansible.windows.win_shell: |
    (Get-MpComputerStatus).IsTamperProtected
  register: tamper_protection_result
  failed_when: false
  changed_when: false

- name: Set tamper protection fact
  ansible.builtin.set_fact:
    tamper_protection_enabled: "{{ true if tamper_protection_result.stdout is defined and 'True' in tamper_protection_result.stdout else false }}"

- name: Run privacy.sexy Defender kill script
  ansible.builtin.script:
    cmd: disable_defender.bat
  register: disable_defender_result
  failed_when: false
  when: tamper_protection_enabled

- name: Reboot after Defender kill (required for driver removal)
  ansible.windows.win_reboot:
  when: tamper_protection_enabled and disable_defender_result is changed

- name: Disable Defender via Group Policy registry keys
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender
    name: DisableAntiSpyware
    data: 1
    type: dword
  failed_when: false

- name: Disable Defender real-time monitoring via registry
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection
    name: "{{ item }}"
    data: 1
    type: dword
  loop:
    - DisableRealtimeMonitoring
    - DisableBehaviorMonitoring
    - DisableOnAccessProtection
    - DisableScanOnRealtimeEnable
    - DisableIOAVProtection
  failed_when: false

- name: Stop Defender service (best effort, post-reboot)
  ansible.windows.win_shell: |
    Stop-Service -Name WinDefend -Force -ErrorAction SilentlyContinue
    Set-Service -Name WinDefend -StartupType Disabled -ErrorAction SilentlyContinue
  changed_when: false
  failed_when: false

# ── Firewall: disable on all profiles ────────────────────────────────
- name: Disable Windows Firewall
  ansible.windows.win_firewall:
    state: disabled
    profiles:
      - Domain
      - Private
      - Public

# ── RDP: ensure enabled ─────────────────────────────────────────────
- name: Enable RDP via registry
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server
    name: fDenyTSConnections
    data: 0
    type: dword

- name: Enable RDP Network Level Authentication
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
    name: UserAuthentication
    data: 1
    type: dword

# ── SSH: install if not present ──────────────────────────────────────
- name: Check if OpenSSH server is installed
  ansible.windows.win_shell: |
    (Get-WindowsCapability -Online -Name OpenSSH.Server*).State
  register: ssh_state
  changed_when: false
  failed_when: false

- name: Install OpenSSH server via DISM
  ansible.windows.win_shell: |
    dism /Online /Add-Capability /CapabilityName:OpenSSH.Server~~~~0.0.1.0 /NoRestart
  when: ssh_state.stdout is not defined or 'Installed' not in ssh_state.stdout
  register: ssh_install
  retries: 3
  delay: 30
  until: ssh_install is not failed
  failed_when: false

- name: Start and enable sshd
  ansible.windows.win_service:
    name: sshd
    start_mode: auto
    state: started
  failed_when: false

# ── Edge: Kibana homepage + bookmarks ────────────────────────────────
- name: Set Edge homepage to Kibana
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: HomepageLocation
    data: "https://10.1.10.10:5601"
    type: string

- name: Set Edge to show homepage on startup
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: HomepageIsNewTabPage
    data: 0
    type: dword

- name: Set Edge startup action to open specific pages
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: RestoreOnStartup
    data: 4
    type: dword

- name: Set Edge startup URL to Kibana
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge\RestoreOnStartupURLs
    name: "1"
    data: "https://10.1.10.10:5601"
    type: string

- name: Set Edge managed bookmarks (Lab folder)
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: ManagedFavorites
    data: '[{"toplevel_name":"Lab"},{"name":"Kibana Dashboard","url":"https://10.1.10.10:5601/app/security/overview"},{"name":"Elastic Alerts","url":"https://10.1.10.10:5601/app/security/alerts"},{"name":"TrustMeBro GitHub","url":"https://github.com/KriyosArcane/TrustMeBro"},{"name":"TrustMeBro Wiki","url":"https://github.com/KriyosArcane/TrustMeBro/wiki"}]'
    type: string

- name: Suppress Edge first-run experience
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: HideFirstRunExperience
    data: 1
    type: dword

- name: Allow insecure localhost (self-signed Kibana cert)
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: SSLErrorOverrideAllowed
    data: 1
    type: dword

# ── Python packages ──────────────────────────────────────────────────
- name: Install Python packages
  ansible.windows.win_shell: |
    pip install --quiet asn1crypto impacket 2>&1 | Out-Null
    python -c "import asn1crypto; import impacket" 2>&1
  register: pip_result
  retries: 3
  delay: 15
  until: pip_result.rc == 0
  failed_when: false

# ── Demo directory structure ─────────────────────────────────────────
- name: Create demo directories
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - C:\Demo
    - C:\Demo\donors
    - C:\Temp

# ── Clone repos ──────────────────────────────────────────────────────
- name: Disable Git credential manager (prevents interactive prompt)
  ansible.windows.win_shell: |
    git config --global credential.helper ""
    git config --global credential.interactive never
  changed_when: false
  failed_when: false

- name: Check if TrustMeBro repo exists
  ansible.windows.win_stat:
    path: C:\Demo\TrustMeBro\.git
  register: tmb_repo

- name: Clone TrustMeBro
  ansible.windows.win_shell: |
    cd C:\Demo
    git clone --depth 1 https://github.com/KriyosArcane/TrustMeBro.git
  when: not tmb_repo.stat.exists
  register: git_clone
  retries: 3
  delay: 10
  until: git_clone is not failed
  failed_when: false

- name: Check if TrustMeBOF repo exists
  ansible.windows.win_stat:
    path: C:\Demo\TrustMeBOF\.git
  register: bof_repo

- name: Clone TrustMeBOF
  ansible.windows.win_shell: |
    cd C:\Demo
    git clone --depth 1 https://github.com/KriyosArcane/TrustMeBOF.git
  when: not bof_repo.stat.exists
  register: git_bof
  retries: 3
  delay: 10
  until: git_bof is not failed
  failed_when: false

# ── Pin TrustMeBro to Explorer Quick Access ──────────────────────────
- name: Pin TrustMeBro folder to Quick Access
  ansible.windows.win_shell: |
    $qa = New-Object -ComObject Shell.Application
    $qa.Namespace('C:\Demo\TrustMeBro').Self.InvokeVerb('pintohome')
  failed_when: false

# ── Stage donor binaries ─────────────────────────────────────────────
- name: Stage donor binaries
  ansible.windows.win_copy:
    src: "{{ item.src }}"
    dest: "C:\\Demo\\donors\\{{ item.name }}"
    remote_src: true
    force: false
  loop:
    - { src: 'C:\Windows\explorer.exe', name: 'explorer.exe' }
    - { src: 'C:\Windows\System32\notepad.exe', name: 'notepad.exe' }
    - { src: 'C:\Windows\System32\mspaint.exe', name: 'mspaint.exe' }

# ── Stage test files ─────────────────────────────────────────────────
- name: Create test payload
  ansible.windows.win_copy:
    content: "DEFCON_DEMO_PAYLOAD_TRUSTMEBRO_2026"
    dest: C:\Demo\payload.bin
    force: false

- name: Create unsigned test binary
  ansible.windows.win_copy:
    src: C:\Windows\System32\notepad.exe
    dest: C:\Demo\unsigned_agent.exe
    remote_src: true
    force: false

