      Write-Host "  Target: 10.1.10.30  Kibana: https://10.1.10.10:5601" -ForegroundColor DarkGray
    dest: C:\Users\localuser\Documents\WindowsPowerShell\Microsoft.PowerShell_profile.ps1
    force: false
  failed_when: false

