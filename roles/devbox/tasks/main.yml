      # TrustMeBro Lab aliases
      Set-Alias tmb 'C:\Demo\TrustMeBro\TrustMeBro.exe'
      Set-Alias tmbpy 'C:\Demo\TrustMeBro\TrustMeBro.py'
      Set-Location C:\Demo\TrustMeBro
      Write-Host "TrustMeBro Lab Ready" -ForegroundColor Green
      Write-Host "  tmb   = TrustMeBro.exe" -ForegroundColor DarkGray
