---
# Target setup: victim machine with Elastic EDR
#
# RELIABILITY RULES FOR 50+ INSTANCE DEPLOYMENT:
# - Never restart WinRM, RDP, or any Ludus management service
# - Every task must be idempotent
# - No ignore_errors on critical tasks
# - Retries on network-dependent operations

# ── Firewall: disable on all profiles ────────────────────────────────
- name: Disable Windows Firewall
  ansible.windows.win_firewall:
    state: disabled
    profiles:
      - Domain
      - Private
      - Public

# ── SSH: install if not present ──────────────────────────────────────
- name: Check if OpenSSH server is installed
  ansible.windows.win_shell: |
    (Get-WindowsCapability -Online -Name OpenSSH.Server*).State
  register: ssh_state
  changed_when: false
  failed_when: false

- name: Install OpenSSH server via DISM
  ansible.windows.win_shell: |
    dism /Online /Add-Capability /CapabilityName:OpenSSH.Server~~~~0.0.1.0 /NoRestart
  when: ssh_state.stdout is not defined or 'Installed' not in ssh_state.stdout
  register: ssh_install
  retries: 3
  delay: 30
  until: ssh_install is not failed
  failed_when: false

- name: Start and enable sshd
  ansible.windows.win_service:
    name: sshd
    start_mode: auto
    state: started
  failed_when: false

# ── Demo directories ─────────────────────────────────────────────────
- name: Create demo directories
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - C:\DemoFiles
    - C:\Temp

# ── Stage test binaries ──────────────────────────────────────────────
- name: Stage unsigned test binary
  ansible.windows.win_copy:
    src: C:\Windows\System32\notepad.exe
    dest: C:\DemoFiles\unsigned_app.exe
    remote_src: true
    force: false

- name: Stage signed carrier binary
  ansible.windows.win_copy:
    src: C:\Windows\explorer.exe
    dest: C:\DemoFiles\signed_carrier.exe
    remote_src: true
    force: false

# ── Verify Defender is running (target should have it active) ────────
- name: Check Defender status
  ansible.windows.win_shell: |
    (Get-MpComputerStatus).RealTimeProtectionEnabled
  register: defender_check
  changed_when: false
  failed_when: false

- name: Report Defender status
  ansible.builtin.debug:
    msg: "Defender RealTime Protection: {{ defender_check.stdout | trim }}"
