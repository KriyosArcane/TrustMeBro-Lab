---
# Target setup: victim machine with Elastic EDR
#
# RELIABILITY RULES FOR 50+ INSTANCE DEPLOYMENT:
# - Never restart WinRM, RDP, or any Ludus management service
# - Every task must be idempotent
# - No ignore_errors on critical tasks
# - Retries on network-dependent operations
# - Defender stays ON (this is the victim machine with EDR)

# ── Firewall: disable on all profiles ────────────────────────────────
- name: Disable Windows Firewall
  ansible.windows.win_firewall:
    state: disabled
    profiles:
      - Domain
      - Private
      - Public

# ── RDP: ensure enabled ─────────────────────────────────────────────
- name: Enable RDP via registry
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server
    name: fDenyTSConnections
    data: 0
    type: dword

- name: Enable RDP Network Level Authentication
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
    name: UserAuthentication
    data: 1
    type: dword

# ── SSH: install if not present ──────────────────────────────────────
- name: Check if OpenSSH server is installed
  ansible.windows.win_shell: |
    (Get-WindowsCapability -Online -Name OpenSSH.Server*).State
  register: ssh_state
  changed_when: false
  failed_when: false

- name: Install OpenSSH server via DISM
  ansible.windows.win_shell: |
    dism /Online /Add-Capability /CapabilityName:OpenSSH.Server~~~~0.0.1.0 /NoRestart
  when: ssh_state.stdout is not defined or 'Installed' not in ssh_state.stdout
  register: ssh_install
  retries: 3
  delay: 30
  until: ssh_install is not failed
  failed_when: false

- name: Start and enable sshd
  ansible.windows.win_service:
    name: sshd
    start_mode: auto
    state: started
  failed_when: false

# ── Edge: Kibana homepage + bookmarks ────────────────────────────────
- name: Set Edge homepage to Kibana
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: HomepageLocation
    data: "https://10.1.10.10:5601"
    type: string

- name: Set Edge to show homepage on startup
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: HomepageIsNewTabPage
    data: 0
    type: dword

- name: Set Edge startup action to open specific pages
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: RestoreOnStartup
    data: 4
    type: dword

- name: Set Edge startup URL to Kibana
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge\RestoreOnStartupURLs
    name: "1"
    data: "https://10.1.10.10:5601"
    type: string

- name: Set Edge managed bookmarks (Lab folder)
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: ManagedFavorites
    data: '[{"toplevel_name":"Lab"},{"name":"Kibana Dashboard","url":"https://10.1.10.10:5601/app/security/overview"},{"name":"Elastic Alerts","url":"https://10.1.10.10:5601/app/security/alerts"}]'
    type: string

- name: Suppress Edge first-run experience
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: HideFirstRunExperience
    data: 1
    type: dword

- name: Allow insecure localhost (self-signed Kibana cert)
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    name: SSLErrorOverrideAllowed
    data: 1
    type: dword

# ── Demo directories ─────────────────────────────────────────────────
- name: Create demo directories
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - C:\DemoFiles
    - C:\Temp

# ── Stage test binaries ──────────────────────────────────────────────
- name: Stage unsigned test binary
  ansible.windows.win_copy:
    src: C:\Windows\System32\notepad.exe
    dest: C:\DemoFiles\unsigned_app.exe
    remote_src: true
    force: false

- name: Stage signed carrier binary
  ansible.windows.win_copy:
    src: C:\Windows\explorer.exe
    dest: C:\DemoFiles\signed_carrier.exe
    remote_src: true
    force: false

# ── Process Monitor: install + filter file ───────────────────────────
- name: Install Process Monitor via Chocolatey
  ansible.windows.win_shell: |
    choco install procmon -y --no-progress
  retries: 3
  delay: 15
  failed_when: false

- name: Create ProcMon filter for WinVerifyTrust activity
  ansible.windows.win_copy:
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <procmon>
        <DestructiveFilter>0</DestructiveFilter>
        <Filters>
          <Filter>
            <Column>Process Name</Column>
            <Relation>is</Relation>
            <action>include</action>
            <Value>WinVerifyTrust</Value>
          </Filter>
          <Filter>
            <Column>Path</Column>
            <Relation>contains</Relation>
            <action>include</action>
            <Value>Microsoft\Cryptography\OID</Value>
          </Filter>
          <Filter>
            <Column>Path</Column>
            <Relation>contains</Relation>
            <action>include</action>
            <Value>Microsoft\Cryptography\Providers\Trust</Value>
          </Filter>
          <Filter>
            <Column>Path</Column>
            <Relation>contains</Relation>
            <action>include</action>
            <Value>CryptSvc</Value>
          </Filter>
          <Filter>
            <Column>Operation</Column>
            <Relation>is</Relation>
            <action>include</action>
            <Value>RegSetValue</Value>
          </Filter>
          <Filter>
            <Column>Operation</Column>
            <Relation>is</Relation>
            <action>include</action>
            <Value>RegQueryValue</Value>
          </Filter>
          <Filter>
            <Column>Path</Column>
            <Relation>contains</Relation>
            <action>include</action>
            <Value>WINTRUST</Value>
          </Filter>
          <Filter>
            <Column>Path</Column>
            <Relation>contains</Relation>
            <action>include</action>
            <Value>SoftwarePublishing</Value>
          </Filter>
        </Filters>
      </procmon>
    dest: C:\Users\Public\Desktop\TrustMeBro_Filter.PMF
    force: false

# ── Event Viewer shortcut ────────────────────────────────────────────
- name: Check if Event Viewer shortcut exists
  ansible.windows.win_stat:
    path: C:\Users\Public\Desktop\Event Viewer.lnk
  register: ev_shortcut
  failed_when: false

- name: Create Event Viewer shortcut on Desktop
  ansible.windows.win_shell: |
    $ws = New-Object -ComObject WScript.Shell
    $lnk = $ws.CreateShortcut('C:\Users\Public\Desktop\Event Viewer.lnk')
    $lnk.TargetPath = 'C:\Windows\System32\eventvwr.msc'
    $lnk.Description = 'Event Viewer - Security and System logs'
    $lnk.Save()
  when: not (ev_shortcut.stat.exists | default(false))
  failed_when: false

# ── TrustMeBro.exe on TARGET for cleanup ─────────────────────────────
- name: Check if TrustMeBro binary exists on TARGET
  ansible.windows.win_stat:
    path: C:\Temp\TrustMeBro.exe
  register: tmb_target

# ── Verify Defender is running (target should have it active) ────────
- name: Check Defender status
  ansible.windows.win_shell: |
    (Get-MpComputerStatus).RealTimeProtectionEnabled
  register: defender_check
  changed_when: false
  failed_when: false

- name: Report Defender status
  ansible.builtin.debug:
    msg: "Defender RealTime Protection: {{ defender_check.stdout | trim }}"

