---
# Target setup: victim machine with Elastic EDR
# Disables firewall, enables SSH/RDP/WinRM/SMB, stages test binaries

- name: Disable Windows Firewall (all profiles)
  ansible.windows.win_shell: |
    Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False

- name: Enable WinRM
  ansible.windows.win_shell: |
    Enable-PSRemoting -Force -SkipNetworkProfileCheck
    Set-Item WSMan:\localhost\Client\TrustedHosts -Value "*" -Force

- name: Enable SSH server
  ansible.windows.win_shell: |
    Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 -ErrorAction SilentlyContinue
    Start-Service sshd -ErrorAction SilentlyContinue
    Set-Service -Name sshd -StartupType Automatic -ErrorAction SilentlyContinue
  ignore_errors: true

- name: Ensure RDP is enabled
  ansible.windows.win_shell: |
    Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0

- name: Ensure SMB is accessible
  ansible.windows.win_shell: |
    Set-SmbServerConfiguration -EnableSMB2Protocol $true -Force

- name: Create demo staging directory
  ansible.windows.win_file:
    path: C:\DemoFiles
    state: directory

- name: Stage unsigned test binary
  ansible.windows.win_copy:
    src: C:\Windows\System32\notepad.exe
    dest: C:\DemoFiles\unsigned_app.exe
    remote_src: true

- name: Stage self-signed test binary (placeholder)
  ansible.windows.win_copy:
    content: "MZ"
    dest: C:\DemoFiles\selfsigned_app.exe
  ignore_errors: true

- name: Stage Microsoft-signed binary for embed demo
  ansible.windows.win_copy:
    src: C:\Windows\explorer.exe
    dest: C:\DemoFiles\signed_carrier.exe
    remote_src: true


- name: Create temp directory for tool output
  ansible.windows.win_file:
    path: C:\Temp
    state: directory

- name: Verify Defender is running
  ansible.windows.win_shell: |
    Get-MpComputerStatus | Select-Object RealTimeProtectionEnabled, AntivirusEnabled | Format-List
  register: defender_status

- name: Print Defender status
  ansible.builtin.debug:
    var: defender_status.stdout_lines
